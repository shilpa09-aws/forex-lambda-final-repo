AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Forex API Lambda function

Resources:
  ForexLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: forex-API-lambda
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      CodeUri: . 
      MemorySize: 128
      Timeout: 60
      Environment:
        Variables:
          BUCKET_NAME: 088597267262-forex-api-results
          BUCKET_PREFIX: forex-Api-Results/
          CURRENCY_LIST: AUD
          SECRET_NAME: forex-api-key  # Fetch the API key from secret manager
      Policies:
        - S3WritePolicy:
            BucketName: 088597267262-forex-api-results
        - S3ReadPolicy:
            BucketName: 088597267262-forex-api-results
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:forex-api-key-*"
    DeletionPolicy: Retain
